<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Adiwiyata</title>
<script src="script.js" defer></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">Adiwiyata</a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="feedback.html">Feedback</a>
                <a href="adiwiyata.html">Adiwiyata</a>
                <a href="games.html">Games</a>
                <a href="info.html">Website Info</a>
            </nav>
        </div>
    </header>
    <section class="facts-section">
        <div class="facts-box expand-section">
            <h2>Feedback</h2>
            <p>Bagikan masukanmu untuk membuat website Adiwiyata lebih baik.</p>

            <div class="feedback-grid">
                <div class="form-box">
                    <h3>Kirim Feedback</h3>
                    <label for="name">Nama</label>
                    <input type="text" id="name" placeholder="Nama">

                    <label for="feedback">Feedback</label>
                    <textarea id="feedback" placeholder="Tulis feedback..."></textarea>

                    <label for="rating">Rating</label>
                    <select id="rating">
                        <option value="">Pilih Rating</option>
                        <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                        <option value="4">⭐⭐⭐⭐ (4)</option>
                        <option value="3">⭐⭐⭐ (3)</option>
                        <option value="2">⭐⭐ (2)</option>
                        <option value="1">⭐ (1)</option>
                    </select>

                    <button onclick="submitFeedback()">Kirim</button>
                </div>

                <div class="showroom">
                    <h3>Showroom Feedback</h3>
                    <div id="feedbackList"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
    // Load footer from external file
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.body.insertAdjacentHTML('beforeend', data);
        })
        .catch(error => console.error('Error loading footer:', error));
    </script>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG KAMU (SUDAH BENAR)
const firebaseConfig = {
  apiKey: "AIzaSyDlLbQXfUoRdzndM4PiQdvmvoumK-SVcUU",
  authDomain: "feedback-adiwiyata.firebaseapp.com",
  projectId: "feedback-adiwiyata",
  storageBucket: "feedback-adiwiyata.firebasestorage.app",
  messagingSenderId: "539045547385",
  appId: "1:539045547385:web:21b7df283801b415db73a8",
  measurementId: "G-Z8GL3J08FT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔄 REALTIME LOAD
const q = query(collection(db, "feedbacks"), orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
    const list = document.getElementById("feedbackList");
    list.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();
        const stars = "⭐".repeat(data.rating);

        list.innerHTML += `
            <div class="feedback-item">
                <div class="feedback-header">
                    <strong>${data.name}</strong>
                    <div class="rating">${stars}</div>
                </div>
                <p>${data.feedback}</p>
            </div>
        `;
    });
});

// 🚀 SUBMIT
window.submitFeedback = async function () {
    const name = document.getElementById("name").value;
    const feedback = document.getElementById("feedback").value;
    const rating = document.getElementById("rating").value;

    if (!name || !feedback || !rating) {
        alert("Isi semua!");
        return;
    }

    await addDoc(collection(db, "feedbacks"), {
        name,
        feedback,
        rating: Number(rating),
        time: Date.now()
    });

    document.getElementById("name").value = "";
    document.getElementById("feedback").value = "";
    document.getElementById("rating").value = "";
};
</script>

</body>
</html>
